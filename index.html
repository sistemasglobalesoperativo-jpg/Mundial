<style>
:root{
  --navy:#07172A; --navy-mid:#0D2340; --navy-lite:#14345A;
  --yellow:#FFD700; --red:#CC2200; --white:#FFF;
  --border:rgba(255,215,0,0.30); --surf:rgba(5,15,28,0.97);
  --fd:'Barlow Condensed','Impact','Arial Narrow',sans-serif;
  --fb:'Roboto','Segoe UI',Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#app{
  position:absolute;top:0;left:0;width:800px;height:280px;
  transform-origin:top left;overflow:hidden;
  font-family:var(--fb);color:var(--white);
  background:linear-gradient(115deg,var(--navy) 0%,var(--navy-mid) 60%,#0A2545 100%);
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER 38px ── */
#hdr{
  position:absolute;top:0;left:0;right:0;height:38px;
  display:flex;align-items:center;gap:10px;padding:0 12px;
  border-bottom:2px solid var(--yellow);
  background:rgba(0,0,0,0.25);
}
#hdr img{height:30px;width:auto}
#hdr .sep{width:1px;height:24px;background:linear-gradient(to bottom,transparent,var(--yellow),transparent);opacity:.6}
#hdr .ttl{
  font-family:var(--fd);font-size:17px;font-weight:900;letter-spacing:2.5px;
  background:linear-gradient(88deg,#FFF 0%,#FFE566 55%,#FFA500 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#hdr .fx{flex:1}
#sc-live{
  display:flex;align-items:center;gap:5px;background:var(--red);
  padding:3px 9px;border-radius:3px;
  font-family:var(--fd);font-size:10px;font-weight:800;letter-spacing:2px;
}
#sc-live .dot{width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1.1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#sc-clock{font-family:var(--fd);font-size:19px;font-weight:700;color:var(--yellow);letter-spacing:1px}

/* ── MAIN 194px: dos mitades ── */
#main{
  position:absolute;top:38px;left:0;right:0;height:194px;
  display:flex;
}
.half{flex:1;display:flex;flex-direction:column;padding:8px 14px;min-width:0}
#divider{width:2px;background:linear-gradient(to bottom,transparent,var(--yellow) 20%,var(--yellow) 80%,transparent);flex-shrink:0}

.sec-lbl{
  font-family:var(--fd);font-size:12px;font-weight:800;letter-spacing:3px;
  color:var(--yellow);text-transform:uppercase;text-align:center;
  margin-bottom:4px;flex-shrink:0;
  animation:fadeDown .4s ease both;
}
@keyframes fadeDown{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* IZQUIERDA: destacado */
#feat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
#f-teams{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;animation:fadeUp .5s .1s ease both}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.f-t{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:90px}
.f-flag{font-size:38px;line-height:1}
.f-name{font-family:var(--fd);font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
#f-mid{display:flex;flex-direction:column;align-items:center;gap:2px}
#f-score{font-family:var(--fd);font-size:46px;font-weight:900;letter-spacing:2px;line-height:1;color:#fff;text-shadow:0 0 16px rgba(255,215,0,.35)}
#f-vs{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--yellow);background:rgba(255,215,0,.12);border:1px solid var(--border);padding:4px 12px;border-radius:3px}
#f-min{
  font-family:var(--fd);font-size:14px;font-weight:800;color:#fff;
  background:var(--red);padding:1px 9px;border-radius:3px;letter-spacing:1px;
  animation:blink 1.4s infinite;
}
#f-sub{display:flex;flex-direction:column;align-items:center;gap:1px;animation:fadeUp .5s .2s ease both}
#f-cdlbl{font-family:var(--fb);font-size:9px;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:2.5px;text-transform:uppercase}
#f-when{font-family:var(--fd);font-size:32px;font-weight:900;color:var(--yellow);letter-spacing:2px;line-height:1.05}
#f-when.urgent{color:#FF5A4E;animation:cdp .6s ease-in-out infinite}
@keyframes cdp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#f-date{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

/* DERECHA: resultados */
#res{flex:1;display:flex;flex-direction:column;justify-content:center;gap:5px}
.r-row{
  display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);
  border-radius:5px;padding:5px 10px;
  animation:slideIn .45s ease both;
}
.r-row:nth-child(2){animation-delay:.08s}
.r-row:nth-child(3){animation-delay:.16s}
.r-row:nth-child(4){animation-delay:.24s}
.r-row:nth-child(5){animation-delay:.32s}
@keyframes slideIn{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}
.r-h{text-align:right}.r-a{text-align:left}
.r-h,.r-a{font-family:var(--fd);font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-sc{
  font-family:var(--fd);font-size:18px;font-weight:900;color:var(--yellow);
  background:rgba(255,215,0,.1);border:1px solid var(--border);
  border-radius:4px;padding:1px 9px;white-space:nowrap;
}
.r-st{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:2px;white-space:nowrap}
.st-live{background:var(--red);color:#fff;animation:blink 1.4s infinite}
.st-ft{background:rgba(255,255,255,.12);color:rgba(255,255,255,.6)}
.st-soon{background:rgba(255,215,0,.15);color:var(--yellow)}
#res .empty{text-align:center;color:rgba(255,255,255,.35);font-size:12px;padding:20px}

/* ── FOOTER amarillo 48px ── */
#ftr{
  position:absolute;bottom:0;left:0;right:0;height:48px;
  background:var(--yellow);display:flex;align-items:center;
}
#ftr .tag{
  background:var(--navy);height:100%;padding:0 14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;
  border-right:2px solid rgba(255,215,0,.3);
}
#ftr .tag .t{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--yellow);letter-spacing:1px}
#ftr .tag .d{font-size:8px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px}
#ftr .msg{
  flex:1;text-align:center;
  font-family:var(--fd);font-size:17px;font-weight:800;color:var(--navy);letter-spacing:1px;
}
#api-pill{position:absolute;top:42px;right:8px;font-size:8px;color:rgba(255,255,255,.2);z-index:50;pointer-events:none}
#api-pill.ok{color:#4CAF50}#api-pill.err{color:var(--red)}#api-pill.demo{color:#FFA040}
</style>
</head>

/* ── TICKER — construye texto con resultados reales ──────────
   Prioridad: LIVE → HT → FT del día → SOON del día → próximos
   ────────────────────────────────────────────────────────── */
function updateTicker(matches) {
  var parts = [];
  var hasLive = false;

  if (matches && matches.length) {
    for (var i = 0; i < matches.length; i++) {
      var m  = matches[i];
      var hs = (m.hs !== null && m.hs !== undefined) ? m.hs : '-';
      var as = (m.as !== null && m.as !== undefined) ? m.as : '-';
      var badge = '';
      if      (m.st === 'LIVE') { badge = m.min ? ' \u25CF EN VIVO ' + m.min : ' \u25CF EN VIVO'; hasLive = true; }
      else if (m.st === 'HT')   { badge = ' \u23F8 M.TIEMPO'; }
      else if (m.st === 'FT')   { badge = m.day ? ' \u2714 FINAL \u00b7 ' + m.day : ' \u2714 FINAL'; }
      else if (m.st === 'HOY')  { badge = ' \u23F0 HOY'; }
      else if (m.st === 'SOON') { badge = ' \u23F0 PR\u00d3XIMO'; }
      parts.push(m.h.f + ' ' + shortName(m.h.n) + ' ' + hs + '\u2013' + as + ' ' + shortName(m.a.n) + ' ' + m.a.f + badge);
    }
  }

  /* Si no hay partidos recientes, mensaje de próximos */
  if (!parts.length) {
    parts.push('\u26BD Vive la fiesta del f\u00fatbol con Sistemas Globales');
    parts.push('Resultados en tiempo real \u00b7 Estad\u00edsticas al minuto');
  }

  /* Añadir separador de marca al final */
  parts.push('\u26BD Vive la fiesta del f\u00fatbol con Sistemas Globales \u00b7 Resultados en tiempo real \u00b7 Estad\u00edsticas al minuto');

  var el = document.getElementById('ticker-txt');
  if (el) {
    el.textContent = parts.join('   \u2015   ');
    /* ticker más rápido cuando hay partidos en vivo */
    el.className = hasLive ? 'fast' : '';
  }
}

/* ── COUNTDOWN ───────────────────────────────────────────────*/
function pad(n){return n < 10 ? '0'+n : ''+n}
function updateCountdown() {
  var el = document.getElementById('countdown');
  if (!window.__NXT) { el.textContent='--:--:--'; return; }
  var diff = window.__NXT - Date.now();
  if (diff <= 0) { el.textContent='\u00a1EN CURSO!'; el.className='urgent'; return; }
  var t  = Math.floor(diff/1000);
  var dy = Math.floor(t/86400);
  var hr = Math.floor((t%86400)/3600);
  var mn = Math.floor((t%3600)/60);
  var sc = t%60;
  el.textContent = dy > 0 ? dy+'d '+pad(hr)+':'+pad(mn) : pad(hr)+':'+pad(mn)+':'+pad(sc);
  el.className   = diff < 300000 ? 'urgent' : '';
}

    var f        = FIXTURE[i];
    var dtStr    = f.dt + ':00';
    /* offset ISO requiere 2 dígitos: -06:00, no -6:00 */
    var offAbs   = Math.abs(f.utcOff);
    var offStr   = (f.utcOff < 0 ? '-' : '+') + (offAbs < 10 ? '0' : '') + offAbs + ':00';
    var dt       = new Date(dtStr + offStr);
    /* si la API ya nos dio la hora oficial, usarla en lugar de la aproximada */
    var officialT = KNOWN_TIMES[f.h + ' vs ' + f.a];
    if (officialT) dt = new Date(officialT);
    var gameDate = dt.toLocaleString('en-CA',{timeZone:CFG.TZ}).substring(0,10);

    var known    = KNOWN_SCORES[f.h + ' vs ' + f.a] || null;
    var hs       = known ? known.hs : f.hs;
    var as       = known ? known.as : f.as;
    var hasScore = (hs !== null && hs !== undefined);

    var diffMs   = now - dt.getTime();
    var isToday  = (gameDate === todayStr);
    var isFuture = dt.getTime() > now;
    var status, min = null;

    if (known && known.live) {
      /* dato REAL en vivo desde scores.json */
      status = 'LIVE';
      min = known.min ? known.min + "'" : (diffMs > 0 ? Math.floor(diffMs/60000)+"'" : null);
    } else if (known && known.ht) {
      status = 'HT'; min = 'HT';
    } else {
      var isLive = isToday && diffMs > 0 && diffMs < 7200000 && !hasScore;
      var isHT   = isToday && diffMs > 2700000 && diffMs < 3600000 && !hasScore;
      if (isHT)          { status = 'HT'; min = 'HT'; }
      else if (isLive)   { status = 'LIVE'; min = Math.floor(diffMs/60000)+"'"; }
      else if (hasScore) status = 'FT';
      else if (isToday)  status = 'HOY';
      else if (isFuture) status = 'SOON';
      else               status = 'FT';
    }

    all.push({
      h:{n:f.h, f:getFlag(f.h)}, a:{n:f.a, f:getFlag(f.a)},
      hs:hs, as:as, st:status, min:min,
      dt:dt.toISOString(), ts:dt.getTime(), gameDate:gameDate,
      venue:(f.g ? 'Grupo '+f.g : '') + (f.venue ? ' \u00b7 ' + f.venue : ''),
      isToday:isToday, isFuture:isFuture,
    });
  }

  all.sort(function(a,b){return a.ts - b.ts;});

  /* Fecha de ayer en zona Colombia */
  var yest = new Date(Date.now() - 86400000);
  var yesterdayStr = yest.toLocaleString('en-CA',{timeZone:CFG.TZ}).substring(0,10);

  var live    = all.filter(function(x){return x.st==='LIVE'||x.st==='HT';});
  var ftToday = all.filter(function(x){return x.st==='FT' && x.gameDate===todayStr;});
  var ftYest  = all.filter(function(x){return x.st==='FT' && x.gameDate===yesterdayStr;});
  var hoyPend = all.filter(function(x){return x.st==='HOY';});
  var future  = all.filter(function(x){return x.st==='SOON';});

  /* etiquetar el día para los badges del ticker */
  ftToday.forEach(function(x){ x.day = 'HOY'; });
  ftYest.forEach(function(x){ x.day = 'AYER'; });

  /* TICKER: en vivo → jugados hoy → jugados ayer → pendientes hoy → próximos */
  var showResults = live.concat(ftToday).concat(ftYest).concat(hoyPend).slice(0,12);
  if (showResults.length < 4) showResults = showResults.concat(future.slice(0, 4 - showResults.length));
  if (!showResults.length) showResults = future.slice(0,5);

  var nextCands = hoyPend.concat(future).concat(live);
  nextCands.sort(function(a,b){return a.ts - b.ts;});
  var nextMatch = nextCands.length
    ? {h:nextCands[0].h, a:nextCands[0].a, dt:nextCands[0].dt, venue:nextCands[0].venue}
    : null;

  return {results:showResults, next:nextMatch};
}

/* ── PARSEAR scores.json (GitHub Action + football-data.org) ─
   Estados de la API: SCHEDULED/TIMED → SOON · IN_PLAY → LIVE
   PAUSED → HT · FINISHED → FT
   Fusiona los resultados al FIXTURE local por nombres de equipo
   ────────────────────────────────────────────────────────── */
var TEAM_ALIASES = {
  'USA':'United States','Korea Republic':'South Korea',
  'IR Iran':'Iran','Czech Republic':'Czechia',
  'Bosnia-Herzegovina':'Bosnia and Herzegovina',
  'Bosnia & Herzegovina':'Bosnia and Herzegovina',
  'T\u00fcrkiye':'Turkey','C\u00f4te d\u2019Ivoire':'Ivory Coast',
  "C\u00f4te d'Ivoire":'Ivory Coast','Cabo Verde':'Cape Verde',
  'Congo DR':'DR Congo','Cura\u00e7ao':'Curacao',
};
function normTeam(n){ return TEAM_ALIASES[n] || n; }

function applyScoresJson(data) {
  if (!data || !data.matches || !data.matches.length) return false;
  /* avisar si el JSON est\u00e1 viejo (Action ca\u00eddo) */
  if (data.updated) {
    var ageMin = (Date.now() - new Date(data.updated).getTime()) / 60000;
    if (ageMin > 30) console.warn('[SG] scores.json tiene ' + Math.round(ageMin) + ' min de antig\u00fcedad');
  }
  var applied = 0;
  for (var i = 0; i < data.matches.length; i++) {
    var m  = data.matches[i];
    var h  = normTeam(m.h), a = normTeam(m.a);
    var key = h + ' vs ' + a;
    /* hora oficial del partido seg\u00fan la API */
    if (m.utcDate) KNOWN_TIMES[key] = m.utcDate;
    if (m.status === 'FINISHED' && m.hs !== null) {
      KNOWN_SCORES[key] = { hs: m.hs, as: m.as };
      applied++;
    } else if (m.status === 'IN_PLAY' || m.status === 'PAUSED') {
      KNOWN_SCORES[key] = {
        hs: (m.hs !== null ? m.hs : 0),
        as: (m.as !== null ? m.as : 0),
        live: (m.status === 'IN_PLAY'),
        ht:   (m.status === 'PAUSED'),
        min:  m.minute || null,
      };
      applied++;
    }
  }
  console.log('[SG] API: ' + applied + ' resultados cargados de ' + data.matches.length + ' partidos');
  return applied > 0;
}

var _apiOk = false;       /* \u00bfya logramos al menos una carga? */
var _retryTimer = null;

function fetchScoresJson(callback) {
  var urls = CFG.SCORES_URLS.filter(function(u){ return u.indexOf('TU-USUARIO') === -1; });
  if (!urls.length) urls = [CFG.SCORES_URLS[0]];

  function tryUrl(idx) {
    if (idx >= urls.length) {
      /* TODAS fallaron */
      setStatus('err', '\u25cf SIN CONEXI\u00d3N API');
      console.warn('[SG] No se pudo leer scores.json de ninguna URL');
      /* reintento autom\u00e1tico cada 15s hasta la primera carga exitosa */
      if (!_apiOk) {
        if (_retryTimer) clearTimeout(_retryTimer);
        _retryTimer = setTimeout(function(){ fetchScoresJson(callback); }, 15000);
      }
      callback(false);
      return;
    }
    var xhr = new XMLHttpRequest();
    xhr.open('GET', urls[idx] + (urls[idx].indexOf('?')>-1?'&':'?') + 't=' + Date.now(), true);
    xhr.timeout = 6000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var ok = applyScoresJson(JSON.parse(xhr.responseText));
          if (ok) { _apiOk = true; if (_retryTimer) clearTimeout(_retryTimer); }
          console.log('[SG] scores.json le\u00eddo desde: ' + urls[idx]);
          callback(ok);
        } catch(e) {
          console.warn('[SG] JSON inv\u00e1lido en ' + urls[idx], e);
          tryUrl(idx + 1);
        }
      } else {
        console.warn('[SG] HTTP ' + xhr.status + ' en ' + urls[idx]);
        tryUrl(idx + 1);
      }
    };
    xhr.onerror = xhr.ontimeout = function() {
      console.warn('[SG] Error de red en ' + urls[idx]);
      tryUrl(idx + 1);
    };
    xhr.send();
  }
  tryUrl(0);
}

/* ── STATUS PILL ─────────────────────────────────────────────*/
function setStatus(cls, txt) {
  var el = document.getElementById('api-pill');
  if (!el) return;
  el.className = 'api-pill '+cls;
  el.textContent = txt;
}

/* ── REFRESH INTELIGENTE ─────────────────────────────────────*/
var _refreshTimer = null;
function scheduleRefresh(ms) {
  if (_refreshTimer) clearTimeout(_refreshTimer);
  _refreshTimer = setTimeout(fetchData, ms);
}

function applyData(parsed, source) {
  if (parsed.next) renderNext(parsed.next);
  updateTicker(parsed.results);
  setStatus('ok', '\u25cf '+source);
  var hasLive = parsed.results.some(function(m){return m.st==='LIVE'||m.st==='HT';});
  scheduleRefresh(hasLive ? CFG.REFRESH : CFG.REFRESH_IDLE);
}

/* ── FETCH — fixture local inmediato + API remota opcional ───*/
function fetchData() {
  if (CFG.DEMO) {
    setStatus('demo', '\u25cf DEMO');
    applyData(buildDemoData(), 'DEMO');
    return;
  }

  /* 1) Pintar INMEDIATO con fixture + resultados ya conocidos */
  applyData(parseLocalFixture(), 'Fixture');

  /* 2) Leer scores.json (GitHub Action) y re-pintar con lo nuevo.
     Es la \u00daNICA fuente remota — sin carreras de datos. */
  setStatus('', '\u25cf Actualizando...');
  fetchScoresJson(function(gotScores) {
    if (gotScores) {
      applyData(parseLocalFixture(), 'En vivo \u00b7 ' +
        new Date().toLocaleTimeString(CFG.LOCALE,{hour:'2-digit',minute:'2-digit',timeZone:CFG.TZ}));
    } else {
      setStatus('ok', '\u25cf Fixture local');
    }
  });
}


/* ══════════════════════════════════════════════════════════
   RENDERS DE LA ESCENA (sobrescriben los del core)
   ══════════════════════════════════════════════════════════ */

function updateClock() {
  var now = new Date();
  var t = now.toLocaleTimeString(CFG.LOCALE,{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:CFG.TZ});
  var d = now.toLocaleDateString(CFG.LOCALE,{weekday:'short',day:'2-digit',month:'short',timeZone:CFG.TZ}).toUpperCase();
  document.getElementById('sc-clock').textContent = t;
  document.getElementById('ftr-time').textContent = t.substring(0,5);
  document.getElementById('ftr-date').textContent = d;
}

/* Partido destacado (izquierda): LIVE si existe, si no el próximo */
function renderFeatured(results, next) {
  var live = null;
  for (var i = 0; i < results.length; i++) {
    if (results[i].st === 'LIVE' || results[i].st === 'HT') { live = results[i]; break; }
  }
  var lbl   = document.getElementById('f-lbl');
  var sc    = document.getElementById('f-score');
  var vs    = document.getElementById('f-vs');
  var mn    = document.getElementById('f-min');
  var cdlbl = document.getElementById('f-cdlbl');
  var when  = document.getElementById('f-when');
  var fdate = document.getElementById('f-date');

  if (live) {
    /* ── PARTIDO EN CURSO: marcador + minuto, c\u00f3mo va ── */
    lbl.innerHTML = '&#128308; En curso';
    document.getElementById('fh-f').textContent = live.h.f;
    document.getElementById('fh-n').textContent = shortName(live.h.n);
    document.getElementById('fa-f').textContent = live.a.f;
    document.getElementById('fa-n').textContent = shortName(live.a.n);
    sc.textContent = (live.hs!=null?live.hs:0) + '\u2013' + (live.as!=null?live.as:0);
    sc.style.display = 'block';
    vs.style.display = 'none';
    mn.textContent = live.st === 'HT' ? 'M.TIEMPO' : (live.min || 'EN VIVO');
    mn.style.display = 'inline-block';
    cdlbl.style.display = 'none';
    when.textContent = live.st === 'HT' ? 'DESCANSO' : 'EN JUEGO';
    when.className = '';
    fdate.textContent = live.venue || '';
    window.__NXT = null;
  } else if (next) {
    /* ── SIN PARTIDO EN CURSO: countdown grande protagonista ── */
    lbl.innerHTML = '&#9654; Pr\u00f3ximo partido';
    document.getElementById('fh-f').textContent = next.h.f || '\uD83C\uDFF3';
    document.getElementById('fh-n').textContent = shortName(next.h.n);
    document.getElementById('fa-f').textContent = next.a.f || '\uD83C\uDFF3';
    document.getElementById('fa-n').textContent = shortName(next.a.n);
    sc.style.display = 'none';
    mn.style.display = 'none';
    vs.style.display = 'inline-block';
    cdlbl.style.display = 'block';
    var d = new Date(next.dt);
    fdate.textContent =
      d.toLocaleDateString(CFG.LOCALE,{weekday:'long',day:'2-digit',month:'short',timeZone:CFG.TZ}).toUpperCase()
      + ' \u00b7 ' + d.toLocaleTimeString(CFG.LOCALE,{hour:'2-digit',minute:'2-digit',timeZone:CFG.TZ})
      + (next.venue ? ' \u00b7 ' + next.venue : '');
    window.__NXT = d;
    updateCountdown(); /* pintar el contador YA, sin esperar al intervalo */
  }
}

/* Countdown compacto bajo la hora */
function updateCountdown() {
  if (!window.__NXT) return; /* hay partido en vivo: f-when muestra EN JUEGO */
  var when = document.getElementById('f-when');
  var diff = window.__NXT - Date.now();
  if (diff <= 0) {
    when.textContent = '\u00a1YA EMPEZ\u00d3!';
    when.className = 'urgent';
    return;
  }
  var t = Math.floor(diff/1000);
  var dy = Math.floor(t/86400), hr = Math.floor((t%86400)/3600), mn2 = Math.floor((t%3600)/60), s = t%60;
  when.textContent = dy > 0
    ? dy + 'd ' + pad(hr) + ':' + pad(mn2) + ':' + pad(s)
    : pad(hr) + ':' + pad(mn2) + ':' + pad(s);
  when.className = diff < 600000 ? 'urgent' : ''; /* rojo pulsante \u00faltimos 10 min */
}

/* Resultados (derecha): 4 filas, sin incluir el partido destacado live */
function renderResultsScene(results) {
  var c = document.getElementById('res');
  c.innerHTML = '';
  var rows = [];
  for (var i = 0; i < results.length && rows.length < 4; i++) {
    var m = results[i];
    if (m.st === 'LIVE' || m.st === 'HT') continue; /* ya está a la izquierda */
    rows.push(m);
  }
  if (!rows.length) {
    c.innerHTML = '<div class="empty">A\u00fan no hay resultados</div>';
    return;
  }
  for (var j = 0; j < rows.length; j++) {
    var m2 = rows[j];
    var hs = (m2.hs!=null) ? m2.hs : '\u2013';
    var as = (m2.as!=null) ? m2.as : '\u2013';
    var stCls = m2.st === 'FT' ? 'st-ft' : 'st-soon';
    var stTxt = m2.st === 'FT' ? ('FINAL' + (m2.day ? ' \u00b7 ' + m2.day : '')) : (m2.st === 'HOY' ? 'HOY' : 'PR\u00d3X.');
    var el = document.createElement('div');
    el.className = 'r-row';
    el.innerHTML =
      '<span class="r-h">' + shortName(m2.h.n) + ' ' + (m2.h.f||'') + '</span>' +
      '<span class="r-sc">' + hs + '\u2013' + as + '</span>' +
      '<span class="r-a">' + (m2.a.f||'') + ' ' + shortName(m2.a.n) + '</span>' +
      '<span class="r-st ' + stCls + '">' + stTxt + '</span>';
    c.appendChild(el);
  }
}

/* applyData de la escena */
function applyData(parsed, source) {
  renderFeatured(parsed.results, parsed.next);
  renderResultsScene(parsed.results);
  setStatus('ok', '\u25cf ' + source);
  var hasLive = parsed.results.some(function(m){return m.st==='LIVE'||m.st==='HT';});
  scheduleRefresh(hasLive ? CFG.REFRESH : CFG.REFRESH_IDLE);
}

/* ── INIT ── */
function init() {
  updateClock();
  setInterval(updateClock, 1000);
  updateCountdown();
  setInterval(updateCountdown, 1000);
  fetchData();
  setTimeout(function(){ location.reload(); }, CFG.RELOAD);
  console.log('[SG Escena] v1.2.0 | misma fuente de datos que index.html');
}
document.addEventListener('DOMContentLoaded', init);

/* API externa mínima */
window.SG = {
  refresh: function(){ fetchData(); },
  score: function(home, away, hs, as_){
    var hL=(home||'').toLowerCase(), aL=(away||'').toLowerCase(), key=null;
    for (var i=0;i<FIXTURE.length;i++){var f=FIXTURE[i];
      if(f.h.toLowerCase().indexOf(hL)===0 && f.a.toLowerCase().indexOf(aL)===0){key=f.h+' vs '+f.a;break;}}
    if(!key){for(var j=0;j<FIXTURE.length;j++){var g=FIXTURE[j];
      if(g.a.toLowerCase().indexOf(hL)===0 && g.h.toLowerCase().indexOf(aL)===0){key=g.h+' vs '+g.a;var t=hs;hs=as_;as_=t;break;}}}
    if(!key) key = home+' vs '+away;
    KNOWN_SCORES[key]={hs:hs,as:as_};
    fetchData();
    console.log('[SG] Guardado:', key, hs+'-'+as_);
  },
  scores: function(){ console.table(KNOWN_SCORES); return KNOWN_SCORES; },
  /* Corregir hora oficial de un partido — EN HORA COLOMBIANA:
     SG.hora('United States','Paraguay','2026-06-12 20:00')
     Acepta nombres parciales igual que SG.score */
  hora: function(home, away, fechaHoraCol){
    var hL=(home||'').toLowerCase(), aL=(away||'').toLowerCase(), key=null;
    for (var i=0;i<FIXTURE.length;i++){var f=FIXTURE[i];
      if(f.h.toLowerCase().indexOf(hL)===0 && f.a.toLowerCase().indexOf(aL)===0){key=f.h+' vs '+f.a;break;}}
    if(!key){ console.warn('[SG] Partido no encontrado: '+home+' vs '+away); return; }
    /* interpretar como hora Colombia (UTC-5) */
    var iso = fechaHoraCol.replace(' ','T') + ':00-05:00';
    var d = new Date(iso);
    if (isNaN(d.getTime())) { console.warn('[SG] Formato inv\u00e1lido. Usa: SG.hora("A","B","2026-06-12 20:00")'); return; }
    KNOWN_TIMES[key] = d.toISOString();
    fetchData();
    console.log('[SG] Hora corregida:', key, '\u2192', d.toLocaleString(CFG.LOCALE,{timeZone:CFG.TZ}));
  },
};
